[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "com.shripad.platesandreps://auth/callback"
additional_redirect_urls = ["com.shripad.platesandreps://auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[auth.external.apple]
enabled = false
client_id = ""
secret = ""
redirect_uri = ""

[edge_runtime]
enabled = true

[functions.ai-chat]
verify_jwt = true

[functions.analyze-food-photo]
verify_jwt = true

[functions.transcribe-voice]
verify_jwt = true

[functions.generate-weekly-review]
verify_jwt = true

[functions.sync-revenuecat-premium]
verify_jwt = true

[functions.delete-account]
verify_jwt = true

[functions.revenuecat-webhook]
verify_jwt = false
